<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WorkLog" />
  <title>WorkLog</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #f5f0eb; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    #app { max-width: 420px; margin: 0 auto; min-height: 100vh; }
    .screen { display: none; flex-direction: column; min-height: 100vh; padding-bottom: 48px; }
    .screen.active { display: flex; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 40px; height: 40px; border: 4px solid #e8e8e8; border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; }

    .hero { text-align: center; padding: 56px 24px 36px; background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%); }
    .hero-icon { font-size: 52px; margin-bottom: 10px; }
    .hero-title { color: #fff; font-size: 38px; font-weight: 800; letter-spacing: -1px; }
    .hero-sub { color: #8892b0; margin-top: 8px; font-size: 15px; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; background: #1a1a2e; padding: 12px 16px; color: #fff; flex-shrink: 0; }
    .wk-name { font-weight: 700; font-size: 16px; }
    .wk-meta { font-size: 12px; color: #8892b0; margin-top: 2px; }
    .timer { font-family: monospace; font-size: 22px; font-weight: 700; color: #e94560; }

    .scroll-area { overflow-y: auto; flex: 1; padding-bottom: 24px; }

    .card { background: #fff; margin: 12px 16px; border-radius: 14px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }

    .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .ex-title { font-weight: 700; font-size: 15px; color: #1a1a2e; }

    .set-header { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; padding: 0 2px; }
    .sh-num { width: 24px; text-align: center; flex-shrink: 0; }
    .sh-field { flex: 1; text-align: center; }
    .sh-del { width: 28px; flex-shrink: 0; }

    .set-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding: 0 2px; }
    .set-num { width: 24px; text-align: center; font-size: 13px; color: #aaa; flex-shrink: 0; }
    .set-input { flex: 1; min-width: 0; border: 1.5px solid #e8e8e8; border-radius: 8px; padding: 8px 4px; font-size: 16px; text-align: center; background: #fafafa; outline: none; font-family: inherit; -webkit-appearance: none; }
    .set-input:focus { border-color: #e94560; }
    .btn-del { width: 28px; flex-shrink: 0; background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 0; line-height: 1; }

    .btn-add-set { background: none; border: 1.5px dashed #ddd; border-radius: 8px; padding: 8px; width: 100%; cursor: pointer; color: #999; font-size: 13px; margin-top: 6px; font-family: inherit; }

    .btn-add-ex-wrap { margin: 0 16px 4px; }
    .btn-add-ex { background: #fff; border: 2px dashed #e94560; border-radius: 14px; padding: 14px; width: 100%; cursor: pointer; color: #e94560; font-size: 15px; font-weight: 700; font-family: inherit; }

    .preset-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .preset-btn { font-size: 12px; padding: 6px 11px; border-radius: 20px; border: 1.5px solid #e0dcd8; background: #fafafa; cursor: pointer; color: #333; font-family: inherit; }
    .custom-row { display: flex; gap: 8px; }
    .text-input { width: 100%; border: 1.5px solid #e8e8e8; border-radius: 10px; padding: 10px 12px; font-size: 15px; outline: none; font-family: inherit; background: #fff; }
    .text-input:focus { border-color: #e94560; }

    .btn-primary { display: block; width: calc(100% - 32px); margin: 12px 16px; background: linear-gradient(135deg, #e94560, #c23152); color: #fff; border: none; border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 800; letter-spacing: 1px; cursor: pointer; font-family: inherit; }
    .btn-secondary { display: block; width: 100%; background: #1a1a2e; color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .btn-sm { background: #1a1a2e; color: #fff; border: none; border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 14px; font-weight: 600; white-space: nowrap; font-family: inherit; flex-shrink: 0; }
    .btn-ghost { background: none; border: none; cursor: pointer; color: #888; font-size: 14px; font-family: inherit; padding: 6px 0; display: block; margin: 6px auto 0; }

    .field-label { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; display: block; }
    textarea.text-input { resize: none; font-size: 14px; }

    .done-hero { text-align: center; padding: 32px 24px 24px; background: linear-gradient(160deg, #1a1a2e, #16213e); }
    .done-title { color: #fff; font-size: 26px; font-weight: 800; margin: 12px 0 20px; }
    .stat-row { display: flex; justify-content: center; gap: 32px; }
    .stat { display: flex; flex-direction: column; align-items: center; }
    .stat-val { color: #e94560; font-size: 24px; font-weight: 800; }
    .stat-label { color: #8892b0; font-size: 12px; margin-top: 2px; }

    pre.summary-pre { background: #1a1a2e; color: #a8d8ea; border-radius: 10px; padding: 14px; font-size: 12px; white-space: pre-wrap; word-break: break-word; margin-top: 8px; font-family: monospace; }

    .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; flex: 1; }
    .analysis-box { margin: 16px; background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .analysis-text { white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.7; color: #1a1a2e; font-family: inherit; }
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="s-home" class="screen active">
    <div class="hero">
      <div class="hero-icon">💪</div>
      <h1 class="hero-title">WorkLog</h1>
      <p class="hero-sub">Track. Analyse. Improve.</p>
    </div>
    <div class="card">
      <label class="field-label" for="workout-name">Workout name</label>
      <input id="workout-name" class="text-input" type="text" value="Evening workout" />
    </div>
    <button class="btn-primary" id="btn-start">START WORKOUT</button>
  </div>

  <!-- WORKOUT -->
  <div id="s-workout" class="screen">
    <div class="top-bar">
      <div>
        <div class="wk-name" id="bar-name">Workout</div>
        <div class="wk-meta" id="bar-meta"></div>
      </div>
      <div class="timer" id="timer">00:00</div>
    </div>
    <div class="scroll-area" id="workout-scroll">
      <div id="ex-list"></div>
      <div class="btn-add-ex-wrap" id="add-ex-wrap">
        <button class="btn-add-ex" id="btn-show-picker">＋ Add exercise</button>
      </div>
      <div id="picker-card" class="card" style="display:none;">
        <div class="preset-grid" id="preset-grid"></div>
        <div class="custom-row">
          <input id="custom-input" class="text-input" type="text" placeholder="Custom exercise…" style="flex:1;" />
          <button class="btn-sm" id="btn-add-custom">Add</button>
        </div>
        <button class="btn-ghost" id="btn-hide-picker">Cancel</button>
      </div>
      <div class="card">
        <label class="field-label" for="notes">Session notes (optional)</label>
        <textarea id="notes" class="text-input" rows="2" placeholder="How did it feel?"></textarea>
      </div>
      <button class="btn-primary" id="btn-finish">FINISH WORKOUT</button>
    </div>
  </div>

  <!-- DONE -->
  <div id="s-done" class="screen">
    <div class="done-hero">
      <div style="font-size:48px">🏁</div>
      <h2 class="done-title">Workout complete!</h2>
      <div class="stat-row">
        <div class="stat"><span class="stat-val" id="stat-dur">-</span><span class="stat-label">Duration</span></div>
        <div class="stat"><span class="stat-val" id="stat-ex">-</span><span class="stat-label">Exercises</span></div>
        <div class="stat"><span class="stat-val" id="stat-sets">-</span><span class="stat-label">Sets</span></div>
      </div>
    </div>
    <button class="btn-primary" id="btn-analyse">🤖 ANALYSE WITH CLAUDE</button>
    <div class="card">
      <label class="field-label">Or copy &amp; paste into Claude:</label>
      <pre class="summary-pre" id="summary-text"></pre>
      <button class="btn-secondary" id="btn-copy">Copy to clipboard</button>
    </div>
    <button class="btn-ghost" id="btn-new-from-done">Start new workout</button>
  </div>

  <!-- ANALYSIS -->
  <div id="s-analysis" class="screen">
    <div class="top-bar">
      <button class="btn-ghost" id="btn-back-analysis" style="color:#8892b0; margin:0;">← Back</button>
      <span style="font-weight:700; color:#fff;">AI Analysis</span>
      <span style="width:60px;"></span>
    </div>
    <div id="analysis-loading" class="loading-wrap">
      <div class="spinner"></div>
      <p style="color:#555; margin-top:16px;">Analysing your workout…</p>
    </div>
    <div id="analysis-done" style="display:none;">
      <div class="analysis-box">
        <p class="analysis-text" id="analysis-text"></p>
      </div>
      <button class="btn-ghost" id="btn-new-from-analysis">Start new workout</button>
    </div>
  </div>

</div>
<script>
(function() {

  // ── State ──
  var wkName = "Evening workout";
  var exercises = [];
  var startTime = null;
  var startDisplay = "";
  var elapsed = 0;
  var timerInterval = null;
  var idCounter = 0;
  var lastSummary = "";

  var PRESETS = [
    "Leg press, 2 legs","Horizontal row","Abduction","Adduction",
    "Leg curl","Leg extension","Chest press","Shoulder press",
    "Lat pulldown","Cable row","Tricep pushdown","Bicep curl",
    "Squat","Deadlift","Bench press","Pull-up","Dip"
  ];

  function fmt(s) {
    return String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
  }
  function nowStr() {
    return new Date().toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"});
  }
  function todayStr() {
    return new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
  }
  function g(id) { return document.getElementById(id); }
  function nextId() { idCounter++; return idCounter; }

  function showScreen(name) {
    var screens = document.querySelectorAll(".screen");
    for (var i = 0; i < screens.length; i++) screens[i].classList.remove("active");
    g("s-" + name).classList.add("active");
    window.scrollTo(0, 0);
  }

  // ── Build preset buttons ──
  var grid = g("preset-grid");
  PRESETS.forEach(function(p) {
    var b = document.createElement("button");
    b.className = "preset-btn";
    b.textContent = p;
    (function(name){ b.addEventListener("click", function(){ addExercise(name); }); })(p);
    grid.appendChild(b);
  });

  // ── Static button wiring ──
  g("btn-start").addEventListener("click", startWorkout);

  g("btn-show-picker").addEventListener("click", function() {
    g("add-ex-wrap").style.display = "none";
    g("picker-card").style.display = "block";
    g("custom-input").value = "";
  });

  g("btn-hide-picker").addEventListener("click", hidePicker);

  g("btn-add-custom").addEventListener("click", function() {
    var v = g("custom-input").value.trim();
    if (v) addExercise(v);
  });

  g("custom-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      var v = g("custom-input").value.trim();
      if (v) addExercise(v);
    }
  });

  g("btn-finish").addEventListener("click", finishWorkout);
  g("btn-analyse").addEventListener("click", runAnalysis);
  g("btn-copy").addEventListener("click", function() {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(lastSummary).then(function() { alert("Copied!"); });
    } else {
      alert("Select the text above and copy it manually.");
    }
  });
  g("btn-new-from-done").addEventListener("click", resetAndHome);
  g("btn-new-from-analysis").addEventListener("click", resetAndHome);
  g("btn-back-analysis").addEventListener("click", function() { showScreen("done"); });

  function hidePicker() {
    g("picker-card").style.display = "none";
    g("add-ex-wrap").style.display = "block";
  }

  // ── Start workout ──
  function startWorkout() {
    wkName = g("workout-name").value.trim() || "Workout";
    exercises = [];
    elapsed = 0;
    idCounter = 0;
    g("ex-list").innerHTML = "";
    g("notes").value = "";
    hidePicker();

    g("bar-name").textContent = wkName;
    startTime = Date.now();
    startDisplay = nowStr();
    g("bar-meta").textContent = todayStr() + " · " + startDisplay;
    g("timer").textContent = "00:00";

    clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      elapsed = Math.floor((Date.now() - startTime) / 1000);
      g("timer").textContent = fmt(elapsed);
    }, 1000);

    showScreen("workout");
  }

  // ── Add exercise ──
  function addExercise(name) {
    var id = nextId();
    exercises.push({ id: id, name: name, sets: [] });
    renderExercise(id, name);
    hidePicker();
    addSet(id);
  }

  function renderExercise(id, name) {
    var card = document.createElement("div");
    card.className = "card";
    card.id = "ex-" + id;

    // Header
    var header = document.createElement("div");
    header.className = "ex-header";
    var titleEl = document.createElement("span");
    titleEl.className = "ex-title";
    titleEl.textContent = name;
    var delEx = document.createElement("button");
    delEx.className = "btn-del";
    delEx.textContent = "✕";
    delEx.style.fontSize = "18px";
    (function(eid){ delEx.addEventListener("click", function(){ removeExercise(eid); }); })(id);
    header.appendChild(titleEl);
    header.appendChild(delEx);

    // Set column headers
    var sh = document.createElement("div");
    sh.className = "set-header";
    sh.innerHTML = '<span class="sh-num">#</span><span class="sh-field">Reps</span><span class="sh-field">kg</span><span class="sh-del"></span>';

    // Set list container
    var setList = document.createElement("div");
    setList.id = "sets-" + id;

    // Add set button
    var addSetBtn = document.createElement("button");
    addSetBtn.className = "btn-add-set";
    addSetBtn.textContent = "+ Add set";
    (function(eid){ addSetBtn.addEventListener("click", function(){ addSet(eid); }); })(id);

    card.appendChild(header);
    card.appendChild(sh);
    card.appendChild(setList);
    card.appendChild(addSetBtn);

    g("ex-list").appendChild(card);
  }

  function removeExercise(id) {
    exercises = exercises.filter(function(e) { return e.id !== id; });
    var card = g("ex-" + id);
    if (card) card.parentNode.removeChild(card);
  }

  // ── Sets ──
  function addSet(exId) {
    var ex = null;
    for (var i = 0; i < exercises.length; i++) { if (exercises[i].id === exId) { ex = exercises[i]; break; } }
    if (!ex) return;
    var prevWeight = ex.sets.length ? ex.sets[ex.sets.length - 1].weight : 20;
    ex.sets.push({ reps: 12, weight: prevWeight });
    renderSet(exId, ex.sets.length - 1, ex.sets[ex.sets.length - 1]);
  }

  function renderSet(exId, si, set) {
    var list = g("sets-" + exId);
    if (!list) return;

    var row = document.createElement("div");
    row.className = "set-row";
    row.id = "set-" + exId + "-" + si;

    var numEl = document.createElement("span");
    numEl.className = "set-num";
    numEl.textContent = si + 1;

    var repsEl = document.createElement("input");
    repsEl.type = "number";
    repsEl.className = "set-input";
    repsEl.value = set.reps;
    repsEl.min = 1;
    repsEl.setAttribute("inputmode", "numeric");
    (function(eid, idx){ repsEl.addEventListener("change", function() {
      var ex = null;
      for (var i = 0; i < exercises.length; i++) { if (exercises[i].id === eid) { ex = exercises[i]; break; } }
      if (ex && ex.sets[idx] !== undefined) ex.sets[idx].reps = parseInt(this.value) || 0;
    }); })(exId, si);

    var kgEl = document.createElement("input");
    kgEl.type = "number";
    kgEl.className = "set-input";
    kgEl.value = set.weight;
    kgEl.min = 0;
    kgEl.step = "0.5";
    kgEl.setAttribute("inputmode", "decimal");
    (function(eid, idx){ kgEl.addEventListener("change", function() {
      var ex = null;
      for (var i = 0; i < exercises.length; i++) { if (exercises[i].id === eid) { ex = exercises[i]; break; } }
      if (ex && ex.sets[idx] !== undefined) ex.sets[idx].weight = parseFloat(this.value) || 0;
    }); })(exId, si);

    var delBtn = document.createElement("button");
    delBtn.className = "btn-del";
    delBtn.textContent = "✕";
    (function(eid, idx){ delBtn.addEventListener("click", function(){ removeSet(eid, idx); }); })(exId, si);

    row.appendChild(numEl);
    row.appendChild(repsEl);
    row.appendChild(kgEl);
    row.appendChild(delBtn);
    list.appendChild(row);
  }

  function removeSet(exId, si) {
    var ex = null;
    for (var i = 0; i < exercises.length; i++) { if (exercises[i].id === exId) { ex = exercises[i]; break; } }
    if (!ex) return;
    ex.sets.splice(si, 1);
    var list = g("sets-" + exId);
    if (!list) return;
    list.innerHTML = "";
    for (var j = 0; j < ex.sets.length; j++) renderSet(exId, j, ex.sets[j]);
  }

  // ── Finish ──
  function finishWorkout() {
    clearInterval(timerInterval);
    var totalSets = 0;
    for (var i = 0; i < exercises.length; i++) totalSets += exercises[i].sets.length;
    g("stat-dur").textContent = fmt(elapsed);
    g("stat-ex").textContent = exercises.length;
    g("stat-sets").textContent = totalSets;
    lastSummary = buildSummary();
    g("summary-text").textContent = lastSummary;
    showScreen("done");
  }

  // ── Summary ──
  function buildSummary() {
    var lines = [
      "Workout: " + wkName,
      "Date: " + todayStr() + " | Start: " + startDisplay + " | Duration: " + fmt(elapsed),
      ""
    ];
    for (var i = 0; i < exercises.length; i++) {
      var ex = exercises[i];
      lines.push("Exercise: " + ex.name);
      var vol = 0;
      for (var j = 0; j < ex.sets.length; j++) {
        var s = ex.sets[j];
        lines.push("  Set " + (j+1) + ": " + s.reps + " reps x " + s.weight + " kg");
        vol += s.reps * s.weight;
      }
      lines.push("  Total volume: " + vol + " kg");
      lines.push("");
    }
    var notes = g("notes").value.trim();
    if (notes) lines.push("Notes: " + notes);
    return lines.join("\n");
  }

  // ── Claude analysis ──
  function runAnalysis() {
    showScreen("analysis");
    g("analysis-loading").style.display = "flex";
    g("analysis-done").style.display = "none";

    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: "You are a knowledgeable fitness coach. Analyse the workout data and provide:\n1. Brief performance summary (2-3 sentences)\n2. Volume totals per exercise and overall\n3. 2-3 specific actionable suggestions for next session\n4. One short encouragement line\nBe concise and specific. Use plain text with clear headers.",
        messages: [{ role: "user", content: "Please analyse this workout:\n\n" + lastSummary }]
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var text = "";
      if (data.content) {
        for (var i = 0; i < data.content.length; i++) {
          if (data.content[i].type === "text") text += data.content[i].text;
        }
      }
      g("analysis-text").textContent = text || "No response received.";
      g("analysis-loading").style.display = "none";
      g("analysis-done").style.display = "block";
    })
    .catch(function(err) {
      g("analysis-text").textContent = "Could not connect to Claude.\n\n" + (err.message || "Unknown error");
      g("analysis-loading").style.display = "none";
      g("analysis-done").style.display = "block";
    });
  }

  // ── Reset ──
  function resetAndHome() {
    exercises = [];
    g("ex-list").innerHTML = "";
    showScreen("home");
  }

})();
</script>
</body>
</html>
